# Privileged mode for system namespaces (needed for CNI, storage, etc)
apiVersion: v1
kind: Namespace
metadata: # kpt-merge: /kube-system
  name: kube-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    internal.kpt.dev/upstream-identifier: '|Namespace|default|kube-system'
---
apiVersion: v1
kind: Namespace
metadata: # kpt-merge: /local-path-storage
  name: local-path-storage
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    internal.kpt.dev/upstream-identifier: '|Namespace|default|local-path-storage'
---
# Baseline mode for network function namespaces
# OAI and Free5GC need some elevated privileges but not fully privileged
apiVersion: v1
kind: Namespace
metadata: # kpt-merge: /openairinterface
  name: openairinterface # kpt-set: ${namespace-prefix}openairinterface
  labels:
    nephio.org/cluster-name: my-ran # kpt-set: ${cluster-name}
    nephio.org/workload-type: ran
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
  annotations:
    internal.kpt.dev/upstream-identifier: '|Namespace|default|openairinterface'
