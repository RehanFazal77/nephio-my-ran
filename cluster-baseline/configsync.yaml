# Namespace for ConfigSync
apiVersion: v1
kind: Namespace
metadata: # kpt-merge: /config-management-system
  name: config-management-system
  labels:
    configmanagement.gke.io/system: "true"
  annotations:
    internal.kpt.dev/upstream-identifier: '|Namespace|default|config-management-system'
---
# ServiceAccount for ConfigSync reconciler
apiVersion: v1
kind: ServiceAccount
metadata: # kpt-merge: config-management-system/root-reconciler
  name: root-reconciler
  namespace: config-management-system
  labels:
    configmanagement.gke.io/system: "true"
    configmanagement.gke.io/arch: "csmr"
  annotations:
    internal.kpt.dev/upstream-identifier: '|ServiceAccount|config-management-system|root-reconciler'
---
# ClusterRole for ConfigSync (needs cluster-admin to apply any resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: # kpt-merge: /root-reconciler
  name: root-reconciler
  labels:
    configmanagement.gke.io/system: "true"
    configmanagement.gke.io/arch: "csmr"
  annotations:
    internal.kpt.dev/upstream-identifier: 'rbac.authorization.k8s.io|ClusterRole|default|root-reconciler'
rules:
# Full access to manage all resources
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
# Access to non-resource URLs
- nonResourceURLs: ["*"]
  verbs: ["*"]
---
# ClusterRoleBinding for ConfigSync
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: # kpt-merge: /root-reconciler
  name: root-reconciler
  labels:
    configmanagement.gke.io/system: "true"
    configmanagement.gke.io/arch: "csmr"
  annotations:
    internal.kpt.dev/upstream-identifier: 'rbac.authorization.k8s.io|ClusterRoleBinding|default|root-reconciler'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: root-reconciler
subjects:
- kind: ServiceAccount
  name: root-reconciler
  namespace: config-management-system
---
# Reconciler Manager Deployment
# This manages the lifecycle of reconcilers (one per RootSync)
apiVersion: apps/v1
kind: Deployment
metadata: # kpt-merge: config-management-system/reconciler-manager
  name: reconciler-manager
  namespace: config-management-system
  labels:
    configmanagement.gke.io/system: "true"
    configmanagement.gke.io/arch: "csmr"
  annotations:
    internal.kpt.dev/upstream-identifier: 'apps|Deployment|config-management-system|reconciler-manager'
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: reconciler-manager
      configmanagement.gke.io/system: "true"
      configmanagement.gke.io/arch: "csmr"
  template:
    metadata:
      labels:
        app: reconciler-manager
        configmanagement.gke.io/system: "true"
        configmanagement.gke.io/arch: "csmr"
    spec:
      serviceAccountName: root-reconciler
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: reconciler-manager
        image: gcr.io/config-management-release/reconciler-manager:v1.17.2
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        env:
        - name: RECONCILER_MANAGER_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
# Config Management Operator Deployment
# This watches for ConfigManagement and RootSync CRs
apiVersion: apps/v1
kind: Deployment
metadata: # kpt-merge: config-management-system/config-management-operator
  name: config-management-operator
  namespace: config-management-system
  labels:
    configmanagement.gke.io/system: "true"
  annotations:
    internal.kpt.dev/upstream-identifier: 'apps|Deployment|config-management-system|config-management-operator'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-management-operator
      configmanagement.gke.io/system: "true"
  template:
    metadata:
      labels:
        app: config-management-operator
        configmanagement.gke.io/system: "true"
    spec:
      serviceAccountName: root-reconciler
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: config-management-operator
        image: gcr.io/config-management-release/config-management-operator:v1.17.2
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
# RootSync CRD - defines what a RootSync resource looks like
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata: # kpt-merge: /rootsyncs.configsync.gke.io
  name: rootsyncs.configsync.gke.io
  labels:
    configmanagement.gke.io/system: "true"
  annotations:
    internal.kpt.dev/upstream-identifier: 'apiextensions.k8s.io|CustomResourceDefinition|default|rootsyncs.configsync.gke.io'
spec:
  group: configsync.gke.io
  names:
    kind: RootSync
    listKind: RootSyncList
    plural: rootsyncs
    singular: rootsync
    shortNames:
    - rs
  scope: Namespaced
  versions:
  - name: v1beta1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        required:
        - spec
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - sourceFormat
            properties:
              sourceFormat:
                type: string
                enum:
                - hierarchy
                - unstructured
                description: Format of the source repository
              git:
                type: object
                required:
                - repo
                - branch
                properties:
                  repo:
                    type: string
                    description: Git repository URL
                  branch:
                    type: string
                    description: Git branch to sync
                  dir:
                    type: string
                    description: Directory within repo to sync
                    default: "/"
                  revision:
                    type: string
                    description: Git revision (commit SHA, tag)
                  auth:
                    type: string
                    enum:
                    - ssh
                    - cookiefile
                    - token
                    - gcenode
                    - gcpserviceaccount
                    - none
                    default: none
                    description: Authentication method
                  secretRef:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of secret containing credentials
                    description: Reference to secret for git authentication
                  period:
                    type: string
                    default: "15s"
                    description: How often to check for changes
                  noSSLVerify:
                    type: boolean
                    default: false
                    description: Skip SSL verification
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
            description: Status of the RootSync
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: RenderingCommit
      type: string
      jsonPath: .status.rendering.commit
    - name: SourceCommit
      type: string
      jsonPath: .status.source.commit
    - name: SyncCommit
      type: string
      jsonPath: .status.sync.commit
    - name: Status
      type: string
      jsonPath: .status.sync.lastUpdate
---
# ConfigManagement CRD (optional, for legacy support)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata: # kpt-merge: /configmanagements.configmanagement.gke.io
  name: configmanagements.configmanagement.gke.io
  labels:
    configmanagement.gke.io/system: "true"
  annotations:
    internal.kpt.dev/upstream-identifier: 'apiextensions.k8s.io|CustomResourceDefinition|default|configmanagements.configmanagement.gke.io'
spec:
  group: configmanagement.gke.io
  names:
    kind: ConfigManagement
    listKind: ConfigManagementList
    plural: configmanagements
    singular: configmanagement
  scope: Cluster
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
